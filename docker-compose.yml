# After changing code, redeploy the app container or you will keep seeing an old bundle:
#   docker compose up -d --build --force-recreate server
# Full stack (app + db): docker compose up -d --build --force-recreate

services:
  server:
    # `latest` is the tag Compose uses for this service; each build also tags `local` (same image ID).
    image: rotlands-server:latest
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - rotlands-server:latest
        - rotlands-server:local
    # LAN play: Windows may block inbound 3000 — allow "node" / Docker on Private networks.
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgres://rotlands:rotlands@postgres:5432/rotlands
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rotlands
      POSTGRES_PASSWORD: rotlands
      POSTGRES_DB: rotlands
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rotlands -d rotlands"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
